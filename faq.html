<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>FAQ / Підтримка</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Nunito&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html"><img src="images/logogrey.png" alt="Логотип"></a>
    </div>
    <h1 class="header-title">Насолоджуйся смаком, ми доставимо</h1>
    <div class="top-menu top-menu-vertical">
      <button class="icon-button"><a href="profile.html">
                <img src="images/profile.png" alt="Профіль"> Профіль
            </a></button>
      <button class="icon-button">
        <img src="images/language.png" alt="English"> English
      </button>
      <button class="icon-button">
        <img src="images/settings.png" alt="Налаштування"> Налаштування
      </button>
    </div>
    <div class="cart">
            <a href="cart.html"><button class="icon-button"><img src="images/cart.png" alt="Кошик"> Кошик</button></a>
        </div>
  </header>

  <h2 class="fastfood-title">FAQ/Підтримка</h2>

  <div class="support-page">
    <div class="faq-section">
      <h3>Популярні запитання</h3>
      <div class="faq-question"><a href="faq+.html">Як зробити замовлення?</a></div>
      <div class="faq-question"><a href="faq+.html">Який час доставки та як відстежити замовлення?</a></div>
      <div class="faq-question"><a href="faq+.html">Які способи оплати доступні?</a></div>
      <div class="faq-question"><a href="faq+.html">Що робити, якщо моє замовлення неправильне або неякісне?</a></div>
      <div class="faq-question"><a href="faq+.html">Як зв'язатися зі службою підтримки?</a></div>
    </div>

    <div class="support-chat">
      <h3>Підтримка:</h3>
      <select class="support-select">
        <option disabled selected>Вибір проблеми</option>
        <option>Проблема з оплатою</option>
        <option>Затримка доставки</option>
        <option>Неякісний товар</option>
        <option>Інше</option>
      </select>
      <div class="chat-box">
        <p>Чат з підтримкою</p>
      </div>
    </div>
  </div>
</body>
</html>
